<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            rel="icon"
            type="image/x-icon"
            href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.psjJWfP7a3D2_p9GunB_FwHaHX%3Fpid%3DApi&f=1&ipt=d34a259d0d26683e9a1a7cc2d08f7911a5b6fd5440562b8c92912dcd710b51c2&ipo=images"
        />
        <style>
            body,
            html {
                height: 100%;
            }
            p {
                text-align: center;
                font-size: 60px;
                color: white;
                background-color: black;
            }
            body {
                background-color: black;
                overflow: hidden; /* Hide scrollbars */
                /* The image used */
                background-image: url("https://kempporter.halls.imperial.ac.uk/wp-content/uploads/2023/04/Kemp-Porter-Building-10th-December-2021-%C2%A9-Brendan-Foster-Photography-384-66-original-resized-same-resolution-1-1980x2969.jpg");
                /* Full height */
                height: 100%;

                /* Center and scale the image nicely */
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <p>LONDON!!!!</p>
        <p id="demo"></p>

        <script>
            // Set the date we're counting down to
            var countDownDate = new Date("May 29, 2026 15:00:00").getTime();

            // Update the count down every 1 second
            var x = setInterval(function () {
                // Get today's date and time
                var now = new Date().getTime();

                // Find the distance between now and the count down date
                var distance = countDownDate - now;

                // Time calculations for days, hours, minutes and seconds
                var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                var hours = Math.floor(
                    (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
                );
                var minutes = Math.floor(
                    (distance % (1000 * 60 * 60)) / (1000 * 60),
                );
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // Output the result in an element with id="demo"
                document.getElementById("demo").innerHTML =
                    days +
                    "d " +
                    hours +
                    "h " +
                    minutes +
                    "m " +
                    seconds +
                    "s ";

                // If the count down is over, write some text
                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("demo").innerHTML = "EXPIRED";
                }
            }, 1000);
        </script>
    </body>
</html>
